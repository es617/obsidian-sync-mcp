# Fly.io configuration for obsidian-sync-mcp
# Copy this to the project root and run: fly launch

app = "obsidian-sync-mcp"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
