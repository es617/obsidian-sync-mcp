# Fly.io configuration for obsidian-sync-mcp
#
# Deploy:
#   cd deploy
#   fly launch
#   fly secrets set COUCHDB_USER=admin COUCHDB_PASSWORD=<strong-password> COUCHDB_DATABASE=obsidian VAULT_NAME=MyVault

app = "obsidian-sync-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "couchdb_data"
  destination = "/opt/couchdb/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
