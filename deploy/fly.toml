# Fly.io configuration for obsidian-sync-mcp
#
# Deploy:
#   cd deploy
#   fly launch
#   fly secrets set COUCHDB_PASSWORD=<password> MCP_AUTH_TOKEN=<password> VAULT_NAME=MyVault

app = "obsidian-sync-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile.fly"

# MCP server (for AI agents)
[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  path = "/health"
  interval = "30s"
  timeout = "5s"

# CouchDB (for Obsidian LiveSync)
[[services]]
  internal_port = 5984
  protocol = "tcp"

  [[services.ports]]
    port = 5984
    handlers = ["tls", "http"]

[mounts]
  source = "couchdb_data"
  destination = "/opt/couchdb/data"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
