# MCP server only — connect to your existing CouchDB
# No volume needed, no CouchDB port

primary_region = 'iad'

[build]

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  interval = '30s'
  timeout = '5s'
  path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
