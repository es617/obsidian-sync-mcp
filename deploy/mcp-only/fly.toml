# fly.toml app configuration file generated for mcp-only-restless-meadow-564 on 2026-03-25T15:05:33-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mcp-only-restless-meadow-564'
primary_region = 'iad'

[build]

[[mounts]]
  source = 'mcp_data'
  destination = '/data'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256
