name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npx --yes oxlint@latest --deny-warnings src/

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci
      - run: npm audit --audit-level=high

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      - run: npm pack --dry-run
      - run: npm pack
      - uses: actions/upload-artifact@v5
        with:
          name: package
          path: "*.tgz"

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci
      - run: npm test

  # E2E: start server in local mode, test all tools via MCP protocol
  test-e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      - run: bash test/e2e.sh

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, audit, build, test, test-e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: package
      - name: Extract changelog
        if: ${{ !contains(github.ref_name, 'rc') }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## ${VERSION}/{found=1; next} /^## /{if(found) exit} found" CHANGELOG.md > release-notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.ref_name }}" == *rc* ]]; then
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              --prerelease \
              *.tgz
          else
            gh release create "${{ github.ref_name }}" \
              --title "${{ github.ref_name }}" \
              --notes-file release-notes.md \
              *.tgz
          fi

  publish-npm:
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, 'rc')
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm publish --provenance --access public

  publish-docker:
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, 'rc')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest
