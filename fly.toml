# Fly.io configuration for obsidian-sync-mcp
# fly launch will generate a unique app name
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile.fly'

[[mounts]]
  source = 'couchdb_data'
  destination = '/opt/couchdb/data'

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    path = '/health'

[[services]]
  protocol = 'tcp'
  internal_port = 5984

  [[services.ports]]
    port = 5984
    handlers = ['tls', 'http']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
